# Hub: gzip + per-IP rate-limit зоны (http-контекст).
# Деплой: /etc/nginx/conf.d/hub-tuning.conf (bootstrap-vps.sh / руками) + reload.
#
# `gzip on` уже включён в nginx.conf — здесь только то, что там закомментировано.
# Без gzip_types Ubuntu-дефолт жмёт ТОЛЬКО text/html: JSON API и JS-бандлы
# уходили несжатыми.
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
    application/json
    application/javascript
    text/javascript
    text/css
    text/plain
    image/svg+xml
    application/manifest+json;

# Per-IP флуд-защита (первый рубеж; per-user лимиты приложения в Redis —
# второй). 30 r/s хватает SPA с параллельными запросами при навигации.
limit_req_zone $binary_remote_addr zone=hub_api:10m rate=30r/s;
# Анонимные публичные ссылки — строже: 5 r/s на IP.
limit_req_zone $binary_remote_addr zone=hub_public:10m rate=5r/s;
limit_req_status 429;

# Learn-медиа: Range-бёрсты видео (много запросов на один просмотр).
limit_req_zone $binary_remote_addr zone=hub_media:10m rate=60r/s;
