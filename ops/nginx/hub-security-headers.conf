# Signaris Hub — security headers (3.6.8 + 3.6.12).
#
# Must be `include`'d INSIDE every `server {}` and every `location {}` that
# also calls `add_header`. nginx's `add_header` has notorious inheritance:
# the FIRST `add_header` at a level kills *all* ancestors' add_headers, so
# we re-emit the full set wherever any add_header exists.
#
# `/p/{token}` overrides `Referrer-Policy` to `no-referrer` and is the only
# place that needs a different value — include this *and then* append a
# per-route override, OR don't include this and re-emit manually (we chose
# manual override in hub.signaris.ru.conf to keep the contract obvious).
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://auth.signaris.ru https://*.ingest.sentry.io https://*.sentry.io; font-src 'self' data:; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
