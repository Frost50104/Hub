# Public-share-token paths must not appear in access_log so a leaked log
# doesn't expose live capabilities. Map runs once per request — cheap.
map $request_uri $hub_log_request {
    ~^/api/public/ 0;
    ~^/p/          0;
    ~^/api/media/  0;
    default        1;
}

server {
    listen 80;
    listen [::]:80;
    server_name hub.signaris.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hub.signaris.ru;

    # SSL — populated by `certbot --nginx -d hub.signaris.ru`.
    ssl_certificate     /etc/letsencrypt/live/hub.signaris.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hub.signaris.ru/privkey.pem;

    # Skip access_log for share-token paths (defined in `map` above).
    access_log /var/log/nginx/access.log combined if=$hub_log_request;

    client_max_body_size 25M;

    # Server-level security headers (fallback for locations without add_header).
    include /etc/nginx/snippets/hub-security-headers.conf;

    root /opt/signaris-hub/web/dist;
    index index.html;

    location = /sw.js {
        include /etc/nginx/snippets/hub-security-headers.conf;
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
    location = /version.json {
        include /etc/nginx/snippets/hub-security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
    location = /manifest.webmanifest {
        include /etc/nginx/snippets/hub-security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }
    location = /index.html {
        include /etc/nginx/snippets/hub-security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Анонимный публичный API — самый строгий лимит (зоны в conf.d/hub-tuning.conf).
    location /api/public/ {
        limit_req zone=hub_public burst=10 nodelay;
        proxy_pass http://127.0.0.1:5059/api/public/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }


    # Learn-медиа (Ф3a): upload до 350 МБ только на этом endpoint'е.
    # proxy_request_buffering off — не писать тело на диск nginx (двойной
    # расход места при загрузке видео).
    location = /api/learn/media {
        client_max_body_size 350m;
        proxy_request_buffering off;
        limit_req zone=hub_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:5059;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # Отдача медиа по подписанным URL: своя щадящая зона (Range-бёрсты
    # видео-плеера магазина за одним NAT не должны ловить 429 общей зоны).
    location /api/media/ {
        limit_req zone=hub_media burst=120 nodelay;
        proxy_pass http://127.0.0.1:5059;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Range $http_range;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Internal-отдача файлов по X-Accel-Redirect (Range/206 обрабатывает nginx).
    location /_protected_media/ {
        internal;
        alias /opt/signaris-hub/attachments/;
    }

    location /api/ {
        limit_req zone=hub_api burst=60 nodelay;
        proxy_pass http://127.0.0.1:5059/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location ~* \.(?:js|css|woff2|svg|png|jpg|jpeg|webp|gif|ico)$ {
        include /etc/nginx/snippets/hub-security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Public-view SPA route. We DON'T include the snippet here — we re-emit
    # all headers manually so we can swap Referrer-Policy → no-referrer.
    location ~ ^/p/ {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://auth.signaris.ru https://*.ingest.sentry.io https://*.sentry.io; font-src 'self' data:; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Cache-Control "no-store" always;
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
