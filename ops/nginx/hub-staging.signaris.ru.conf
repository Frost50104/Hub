server {
    listen 80;
    listen [::]:80;
    server_name hub-staging.signaris.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hub-staging.signaris.ru;

    # SSL — populated by `certbot --nginx -d hub-staging.signaris.ru`.
    ssl_certificate     /etc/letsencrypt/live/hub-staging.signaris.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hub-staging.signaris.ru/privkey.pem;

    client_max_body_size 25M;  # Hub-MVP.5: attachments up to 20 MB + headroom

    # ─── Security headers (3.6.8.2) — identical to prod ─────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://auth.signaris.ru https://*.ingest.sentry.io https://*.sentry.io; font-src 'self' data:; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    root /opt/signaris-hub-staging/web/dist;
    index index.html;

    # Service Worker must control entire origin
    location = /sw.js {
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Build-time version + manifest must always re-fetch
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:5060/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Hashed assets — long cache
    location ~* \.(?:js|css|woff2|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — everything else returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
