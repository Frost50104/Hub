name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install signaris-hub + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" \
            --extra-index-url https://auth.signaris.ru/pypi/simple/

      - name: ruff
        run: ruff check app tests

      - name: pytest (unit only — integration tests need Postgres+Redis testcontainers)
        run: pytest -x -m "not integration"

  frontend:
    name: frontend (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test -- --run
      - run: npm run build
