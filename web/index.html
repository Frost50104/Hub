<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand/signaris-favicon-on-dark.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#08080E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hub" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Onest:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Signaris Hub</title>
    <script>
      // Apply the saved theme before first paint (no FOUC). Keep in sync with
      // src/lib/theme.ts (key + resolution logic).
      (function () {
        try {
          var t = localStorage.getItem('hub-theme')
          var resolved = t === 'light' ? 'light' : 'dark'
          document.documentElement.setAttribute('data-theme', resolved)
          var m = document.querySelector('meta[name="theme-color"]')
          if (m) m.setAttribute('content', resolved === 'light' ? '#ffffff' : '#08080e')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
