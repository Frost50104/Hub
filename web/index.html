<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand/signaris-favicon-on-dark.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#08080E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hub" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <!-- Шрифты self-hosted (src/styles/fonts.css): CSP style-src 'self'
         блокирует Google Fonts, внешних <link> здесь быть не должно. -->
    <title>Signaris Hub</title>
    <script>
      // Apply the saved theme before first paint (no FOUC). Keep in sync with
      // src/lib/theme.ts (key + resolution logic).
      // ВАЖНО: CSP script-src разрешает этот скрипт по sha256-хэшу
      // (ops/nginx/hub-security-headers.conf). Любая правка тела скрипта
      // требует пересчёта хэша, иначе тема молча перестанет применяться.
      (function () {
        try {
          var t = localStorage.getItem('hub-theme')
          var resolved = t === 'light' ? 'light' : 'dark'
          document.documentElement.setAttribute('data-theme', resolved)
          var m = document.querySelector('meta[name="theme-color"]')
          if (m) m.setAttribute('content', resolved === 'light' ? '#ffffff' : '#08080e')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
